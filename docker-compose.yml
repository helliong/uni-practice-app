services:
  postgres:
    image: postgres:16-alpine
    container_name: uni-practice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uni_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uni_password}
      POSTGRES_DB: ${POSTGRES_DB:-uni_practice_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uni_user} -d ${POSTGRES_DB:-uni_practice_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: uni-practice-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-uni_user}:${POSTGRES_PASSWORD:-uni_password}@postgres:5432/${POSTGRES_DB:-uni_practice_app}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-before-deploy}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    ports:
      - "${APP_PORT:-3001}:3000"
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  postgres_data:
  uploads_data:
