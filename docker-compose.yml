services:
  postgres:
    image: postgres:16-alpine
    container_name: uni-practice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uni_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uni_password}
      POSTGRES_DB: ${POSTGRES_DB:-uni_practice_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uni_user} -d ${POSTGRES_DB:-uni_practice_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    build:
      context: .
      target: deps
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-uni_user}:${POSTGRES_PASSWORD:-uni_password}@postgres:5432/${POSTGRES_DB:-uni_practice_app}?schema=public
    command: ["sh", "-c", "npx prisma migrate deploy && npx tsx prisma/seed.ts"]

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/campuscode-products &&
        mc anonymous set download local/campuscode-products

  app:
    build:
      context: .
    container_name: uni-practice-app
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-uni_user}:${POSTGRES_PASSWORD:-uni_password}@postgres:5432/${POSTGRES_DB:-uni_practice_app}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-before-deploy}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Campus & Code <noreply@campus-code.local>}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-campuscode-products}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/campuscode-products}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      PAYMENT_MODE: ${PAYMENT_MODE:-mock}
      YOOKASSA_API_URL: ${YOOKASSA_API_URL:-https://api.yookassa.ru/v3}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:3001}
    ports:
      - "${APP_PORT:-3001}:3000"
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  minio_data:
  uploads_data:
